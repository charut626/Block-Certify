<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block-Certify — Blockchain Certificate Verification</title>
    <meta name="description" content="Verify and authenticate certificates on the blockchain with Block-Certify. Upload, verify, and analyze certificates securely.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Reset & Variables ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.6);
            --bg-card-hover: rgba(17, 24, 39, 0.8);
            --border-glass: rgba(99, 102, 241, 0.15);
            --border-glass-hover: rgba(99, 102, 241, 0.35);
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.08);
        }

        /* ===== Base ===== */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== Animated Background ===== */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float 18s ease-in-out infinite;
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            animation: float 22s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ===== Grid Lines Overlay ===== */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ===== Layout ===== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(16,185,129,0.10));
            border: 1px solid var(--border-glass);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-secondary);
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #f1f5f9 0%, #818cf8 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: fadeInDown 0.7s ease-out;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 400;
            max-width: 480px;
            margin: 0 auto;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Glass Card ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 36px;
            box-shadow: var(--shadow-glow);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.7s ease-out;
        }

        .glass-card:hover {
            border-color: var(--border-glass-hover);
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Upload Zone ===== */
        .upload-zone {
            border: 2px dashed rgba(99, 102, 241, 0.25);
            border-radius: var(--radius-lg);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 28px;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99,102,241,0.04), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent-primary);
            background: rgba(99,102,241,0.05);
        }

        .upload-zone:hover::before,
        .upload-zone.drag-over::before {
            opacity: 1;
        }

        .upload-zone.has-file {
            border-color: var(--success);
            background: rgba(16,185,129,0.05);
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(99,102,241,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .upload-zone:hover .upload-icon {
            transform: translateY(-4px);
        }

        .upload-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent-secondary);
        }

        .upload-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .upload-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-name {
            display: none;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
            padding: 10px 18px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--success);
        }

        .file-name.visible {
            display: inline-flex;
        }

        .file-name svg {
            width: 16px;
            height: 16px;
            stroke: var(--success);
            flex-shrink: 0;
        }

        #fileInput {
            display: none;
        }

        /* ===== Action Buttons ===== */
        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 12px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn .icon-box {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease;
        }

        .btn:hover .icon-box {
            transform: scale(1.08);
        }

        .btn .icon-box svg {
            width: 22px;
            height: 22px;
        }

        /* Upload Button */
        .btn-upload {
            border-color: rgba(99,102,241,0.25);
        }
        .btn-upload::before {
            background: linear-gradient(135deg, rgba(99,102,241,0.08), transparent);
        }
        .btn-upload:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 8px 32px rgba(99,102,241,0.15);
        }
        .btn-upload:hover::before { opacity: 1; }
        .btn-upload .icon-box {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(99,102,241,0.08));
        }
        .btn-upload .icon-box svg { stroke: var(--accent-secondary); }

        /* Verify Button */
        .btn-verify {
            border-color: rgba(16,185,129,0.25);
        }
        .btn-verify::before {
            background: linear-gradient(135deg, rgba(16,185,129,0.08), transparent);
        }
        .btn-verify:hover {
            border-color: var(--success);
            box-shadow: 0 8px 32px rgba(16,185,129,0.15);
        }
        .btn-verify:hover::before { opacity: 1; }
        .btn-verify .icon-box {
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.08));
        }
        .btn-verify .icon-box svg { stroke: var(--success); }

        /* Analyze Button */
        .btn-analyze {
            border-color: rgba(245,158,11,0.25);
        }
        .btn-analyze::before {
            background: linear-gradient(135deg, rgba(245,158,11,0.08), transparent);
        }
        .btn-analyze:hover {
            border-color: var(--warning);
            box-shadow: 0 8px 32px rgba(245,158,11,0.15);
        }
        .btn-analyze:hover::before { opacity: 1; }
        .btn-analyze .icon-box {
            background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08));
        }
        .btn-analyze .icon-box svg { stroke: var(--warning); }

        /* Disabled */
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== Output Panel ===== */
        .output-panel {
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-glass);
            animation: fadeInUp 0.8s ease-out;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(99,102,241,0.06);
            border-bottom: 1px solid var(--border-glass);
        }

        .output-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .output-header .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dots span:nth-child(1) { background: #ef4444; }
        .terminal-dots span:nth-child(2) { background: #f59e0b; }
        .terminal-dots span:nth-child(3) { background: #10b981; }

        .output-header .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .output-body {
            padding: 20px;
            background: rgba(0,0,0,0.25);
            min-height: 120px;
            max-height: 400px;
            overflow-y: auto;
        }

        .output-body::-webkit-scrollbar {
            width: 6px;
        }

        .output-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-body::-webkit-scrollbar-thumb {
            background: rgba(99,102,241,0.25);
            border-radius: 3px;
        }

        #output {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .output-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 0;
            color: var(--text-muted);
        }

        .output-placeholder svg {
            width: 36px;
            height: 36px;
            stroke: var(--text-muted);
            opacity: 0.4;
        }

        .output-placeholder span {
            font-size: 13px;
            font-weight: 500;
        }

        /* ===== Result Styling ===== */
        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s ease;
        }

        .result-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .result-key {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--accent-secondary);
            min-width: 120px;
            padding-top: 2px;
            flex-shrink: 0;
        }

        .result-value {
            font-size: 13px;
            color: var(--text-primary);
            word-break: break-all;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.valid {
            background: rgba(16,185,129,0.12);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.25);
        }

        .status-badge.tampered {
            background: rgba(239,68,68,0.12);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.25);
        }

        .status-badge .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ===== Loading Spinner ===== */
        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 30px 0;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(99,102,241,0.15);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid rgba(99,102,241,0.08);
            animation: fadeInUp 1s ease-out;
        }

        .footer p {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .footer .chain-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 6px 14px;
            background: rgba(130, 71, 229, 0.08);
            border: 1px solid rgba(130, 71, 229, 0.2);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: #a78bfa;
            letter-spacing: 0.5px;
        }

        .footer .chain-badge svg {
            width: 14px;
            height: 14px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .app-container {
                padding: 24px 16px 40px;
            }

            .glass-card {
                padding: 24px 18px;
                border-radius: var(--radius-lg);
            }

            .actions {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .btn {
                flex-direction: row;
                padding: 14px 18px;
                gap: 12px;
            }

            .btn .icon-box {
                width: 36px;
                height: 36px;
            }

            .upload-zone {
                padding: 32px 16px;
            }

            .result-item {
                flex-direction: column;
                gap: 4px;
            }

            .result-key {
                min-width: unset;
            }
        }
    </style>
</head>

<body>

    <!-- Background Effects -->
    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <!-- Main App -->
    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="logo-badge">
                <div class="dot"></div>
                <span>Blockchain Secured</span>
            </div>
            <h1>Block-Certify</h1>
            <p>Upload, verify and analyze certificates with tamper-proof blockchain technology</p>
        </header>

        <!-- Main Card -->
        <div class="glass-card">

            <!-- File Upload Zone -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <div class="upload-title">Drop your certificate here</div>
                <div class="upload-subtitle">or click to browse · PDF, JPG, PNG supported</div>
                <div class="file-name" id="fileName">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span id="fileNameText"></span>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.gif,.bmp,.tiff">
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button class="btn btn-upload" id="btnUpload" onclick="uploadCertificate()">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            <line x1="12" y1="8" x2="12" y2="14"/>
                            <line x1="9" y1="11" x2="15" y2="11"/>
                        </svg>
                    </div>
                    Upload & Hash
                </button>

                <button class="btn btn-verify" id="btnVerify" onclick="verifyCertificate()">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    Verify
                </button>

                <button class="btn btn-analyze" id="btnAnalyze" onclick="analyzeCertificate()">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            <line x1="11" y1="8" x2="11" y2="14"/>
                            <line x1="8" y1="11" x2="14" y2="11"/>
                        </svg>
                    </div>
                    Analyze
                </button>
            </div>

            <!-- Output Panel -->
            <div class="output-panel">
                <div class="output-header">
                    <div class="output-header-left">
                        <div class="terminal-dots">
                            <span></span><span></span><span></span>
                        </div>
                        <span class="label">Output</span>
                    </div>
                </div>
                <div class="output-body">
                    <div id="output">
                        <div class="output-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                <line x1="8" y1="21" x2="16" y2="21"/>
                                <line x1="12" y1="17" x2="12" y2="21"/>
                            </svg>
                            <span>Results will appear here</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Ethereum Smart Contracts</p>
            <div class="chain-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
                Polygon Amoy Testnet
            </div>
        </footer>
    </div>

    <!-- ===== JavaScript ===== -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const fileNameEl = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const outputEl = document.getElementById('output');

        // Click to browse
        uploadZone.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFileName(e.dataTransfer.files[0].name);
            }
        });

        // File selected
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) {
                showFileName(fileInput.files[0].name);
            }
        });

        function showFileName(name) {
            fileNameText.textContent = name;
            fileNameEl.classList.add('visible');
            uploadZone.classList.add('has-file');
        }

        function showLoading(message) {
            outputEl.innerHTML = `
                <div class="spinner-container">
                    <div class="spinner"></div>
                    <div class="spinner-text">${message}</div>
                </div>
            `;
        }

        function showResult(data) {
            let html = '';
            for (const [key, value] of Object.entries(data)) {
                const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
                let valueHtml = '';

                if (key === 'verificationResult') {
                    const isValid = value === 'VALID CERTIFICATE';
                    valueHtml = `<span class="status-badge ${isValid ? 'valid' : 'tampered'}"><span class="badge-dot"></span>${value}</span>`;
                } else if (key === 'blockchainStatus') {
                    const isOnChain = value === true;
                    valueHtml = `<span class="status-badge ${isOnChain ? 'valid' : 'tampered'}"><span class="badge-dot"></span>${isOnChain ? 'On-Chain' : 'Not Found'}</span>`;
                } else if (typeof value === 'string' && value.length > 80) {
                    valueHtml = `<span class="result-value" style="font-size:12px;">${escapeHtml(value)}</span>`;
                } else {
                    valueHtml = `<span class="result-value">${escapeHtml(String(value))}</span>`;
                }

                html += `
                    <div class="result-item">
                        <span class="result-key">${escapeHtml(label)}</span>
                        ${valueHtml}
                    </div>
                `;
            }
            outputEl.innerHTML = html;
        }

        function showError(msg) {
            outputEl.innerHTML = `
                <div class="result-item" style="border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.05);">
                    <span class="result-key" style="color: var(--danger);">Error</span>
                    <span class="result-value" style="color: var(--danger);">${escapeHtml(msg)}</span>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getFile() {
            const file = fileInput.files[0];
            if (!file) {
                // Shake the upload zone
                uploadZone.style.animation = 'none';
                uploadZone.offsetHeight; // trigger reflow
                uploadZone.style.animation = 'shake 0.4s ease';
                setTimeout(() => uploadZone.style.animation = '', 400);
                return null;
            }
            return file;
        }

        // Inject shake keyframe
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-6px); }
                80% { transform: translateX(6px); }
            }
        `;
        document.head.appendChild(style);


        async function uploadCertificate() {
            const file = getFile();
            if (!file) return;

            const formData = new FormData();
            formData.append("certificate", file);

            showLoading("Hashing & storing on blockchain...");

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if (result.error) {
                    showError(result.error);
                } else {
                    showResult(result);
                }
            } catch (err) {
                showError("Network error. Is the server running?");
            }
        }


        async function verifyCertificate() {
            const file = getFile();
            if (!file) return;

            const formData = new FormData();
            formData.append("certificate", file);

            showLoading("Verifying against blockchain...");

            try {
                const response = await fetch("/verify", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if (result.error) {
                    showError(result.error);
                } else {
                    showResult(result);
                }
            } catch (err) {
                showError("Network error. Is the server running?");
            }
        }


        async function analyzeCertificate() {
            const file = getFile();
            if (!file) return;

            const formData = new FormData();
            formData.append("certificate", file);

            showLoading("Running OCR analysis...");

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if (result.error) {
                    showError(result.error);
                } else {
                    showResult(result);
                }
            } catch (err) {
                showError("Network error. Is the server running?");
            }
        }
    </script>

</body>

</html>
